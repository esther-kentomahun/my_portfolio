<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>    
<title>ESTHER KENT PORTFOLIO</title>
<meta charset="UFT-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-slate-200 text-slate-900 min-h-screen">
<header class="w-full max-w-6xl mx-auto px-6 py-6 flex justify-between items-center">
    <span class="text-xl font-bold tracking-wider">ESTHER KENTOMAHUN</span>
    <nav class="space-x-6 text-sm font-medium text-slate-600">
        <a href="#projects" class="hover:text-slate-900 transition">Projects</a>
        <a href="https://github.com/esther-kentomahun" target="_blank" class="hover:text-slate-900 transition">GitHub</a>
    </nav>
</header>
<!--About Me-->
<main>
    <section class="max-w-6xl mx-auto px-6 py-16 flex flex-col-reverse md:flex-row items-center justify-between gap-12">
        <div class="space-y-4 text-center md:text-left flex-1">
            <h1 class="text-4xl font-bold tracking-tight text-slate-900">Hi, I'm Esther Kentomahun</h1>
            <p class="text-lg leadimg-relaxed text-slate-700 max-w-xl">
                I am a web developer focused on building clean, visual-first digital experiences. Currently honing my skills in semantic HTML5, utility-first styling with Tailwind CSS, and clean data-driven architecture in JavaScript.
            </p>
        </div>
        <div class="w-48 h-48 md:w-64 md:h-64 flex-shrink-0">
            <img src="head_shot.jpeg" alt="Kentomahun Esther" class="w-full h-full object-cover rounded-full object-[40%_30%]">
        </div>
    </section>
    <hr class="border-slate-200 max-w-6xl mx-auto my-4">
   <!--search section-->
   <section id="projects" class="w-full max-w-6xl mx-auto px-6 py-12 space-y-6">
       <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
           <div class="w-full max-w-md">
              <input type="text" id="searchInput" placeholder="Search projects" 
              class="w-full px-4 py-2 rounded-lg border border-slate-400 bg-white" focus:outline-none focus:ring-2 fous:ring-slate-500 focus:border-transparent text-sm shawdow-sm>
           </div>
          <div id="filter-buttons" class="flex flex-wrap gap-2">
             <button id="allBtn" data-category="all" class="px-4 py-2 text-sm font-medium rounded-md bg-white text-slate-700 shadow hover:bg-slate-300">All</button>
             <button id="htmlBtn" data-category="html-css" class="px-4 py-2 text-sm font-medium rounded-md bg-white border border-slate-400 text-slate-700 hover:bg-slate-300 transition">HTML/CSS</button>
             <button id="jsBtn" data-category="javascript" class="px-4 py-2 text-sm font-medium rounded-md bg-white border border-slate-400 text-slate-700 hover:bg-slate-300 transition">JavaScript</button>
           </div>
      </div>
    </section>
    <section class="w-full max-w-6xl mx-auto px-6 pb-24">
        <div id="projectsContainer" class="w-full grid-cols-1 md:grid grid-cols-2 gap-8"></div>
        <div id="errorMSG" class="text-red-500 mt-2 text-sm font-semibold h-5 pl-1"></div>
    </section>
</main>
</body>
<script src="portfolio.js"></script>
</html>
